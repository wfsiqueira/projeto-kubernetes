apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: homeassistant-ingress
  namespace: home-assistant
  annotations:
    ingress.kubernetes.io/rewrite-target: /
    external-dns.alpha.kubernetes.io/cloudflare-proxied: "true"
    external-dns.alpha.kubernetes.io/hostname: homeassistant.wsiqueira.cloud
    external-dns.alpha.kubernetes.io/target: 52ba8e90-d83c-47ce-8187-4a0e710637fa.cfargotunnel.com
spec:
  rules:
  - host: homeassistant.wsiqueira.cloud
    http:
      paths:
      - backend:
          service:
            name: home-assistant
            port:
              number: 80
        path: /
        pathType: Prefix
